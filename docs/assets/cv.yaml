summary: Matthias Meschede
what: |
  I am Chief Operating Officer at QuantStack, one of the leading forces behind
  Jupyter, Apache Arrow, Conda/Mamba and other popular open source ecosystems.
  I support the team with project initiation, requirement gathering, solution
  design, sales, and operations — and do hands-on engineering when possible
  and needed. I contribute to open source myself, principally with Python,
  Haskell, Nix, Fortran, Rust and C in the context of modeling, data science
  and data engineering.

  I have organized, shaped and participated in governance, community events
  and business models around open source. I was on the NixOS RFC Steering
  Committee, co-created and organized Summer of Nix for two years, co-created
  and organized the Compute! conference, and served on the PyData Paris
  organizing committee.
domains: |
  I started my career with degrees in Physics, worked in Biophysics, and
  earned a PhD in Geophysics working on seismic wave propagation, tomography,
  and signal processing. The common thread was understanding and implementing
  mathematical models with computers. After a Post Doc, I transitioned fully
  to software.

  Since then I have worked across many domains: Quantitative Marketing,
  Fintech, Biopharma, Aeronautics, Cybersecurity (frequent security audits
  and penetration testing projects), Build Systems (Nix and Bazel, working
  with one of the world-leading teams), Semantic Web (knowledge graph
  projects), and UI/Web (end-to-end web applications, from design and
  requirements to guiding teams through implementation).
stack: |
  I have worked with a variety of programming languages and frameworks.
  Academically, I ran large parallel Fortran simulation codes and the Python
  data/machine learning stack. In industry, I have worked with Python, Java,
  Ruby, TypeScript, functional frameworks in Elm, PureScript (as this website)
  and Haskell, building backend services, specialized libraries, and web
  applications. I discovered and learned to love Nix and NixOS over the last
  years.

  On the modeling side, I have a strong understanding of signal processing,
  differential equation solvers, Bayesian statistics, inverse methods and
  data-driven machine learning. I have always enjoyed creating effective data
  visualizations, from matplotlib and d3.js to Vega.
